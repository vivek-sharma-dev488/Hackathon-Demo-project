<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meal Pre‑Booking & Waste Monitor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header with logout button -->
        <header class="header">
            <h1>🍽️ Meal Pre‑Booking System</h1>
            <button id="logoutBtn" class="btn btn-outline" style="display: none;">Logout</button>
        </header>

        <!-- Authentication Section (Login / Signup) -->
        <div id="authSection" class="auth-section">
            <div class="card auth-card">
                <div class="tab-buttons">
                    <button id="loginTab" class="tab active">Login</button>
                    <button id="signupTab" class="tab">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="signupName" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="signupRole">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <div id="signupError" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- User Dashboard (initially hidden) -->
        <div id="userDashboard" class="dashboard" style="display: none;">
            <h2>User Dashboard</h2>
            <div class="dashboard-grid">
                <!-- Meals Section -->
                <div class="card meals-section">
                    <h3>📅 Upcoming Meals</h3>
                    <div id="userMealsContainer" class="meals-grid"></div>
                </div>
                <!-- Booking History Section -->
                <div class="card history-section">
                    <h3>📜 Your Booking History</h3>
                    <div id="bookingHistoryContainer" class="history-list"></div>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard (initially hidden) -->
        <div id="adminDashboard" class="dashboard" style="display: none;">
            <h2>Admin Dashboard</h2>
            <div class="dashboard-grid">
                <!-- Meals Management -->
                <div class="card meals-management">
                    <h3>🍲 Manage Meals</h3>
                    <button id="addMealBtn" class="btn btn-secondary">+ Add New Meal</button>
                    <div id="adminMealsContainer" class="meals-grid"></div>
                </div>
                <!-- Waste Logging -->
                <div class="card waste-logging">
                    <h3>🗑️ Log Waste Data</h3>
                    <div id="wasteLogFormContainer"></div>
                    <div id="wasteLogsTable" class="waste-table"></div>
                </div>
                <!-- Analytics & Charts -->
                <div class="card analytics">
                    <h3>📊 Analytics & Insights</h3>
                    <div class="chart-container">
                        <canvas id="bookedVsPreparedChart" width="400" height="200"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="wasteTrendsChart" width="400" height="200"></canvas>
                    </div>
                    <div id="insights" class="insights"></div>
                    <div id="prediction" class="prediction"></div>
                </div>
            </div>
        </div>

        <!-- Modal for Add/Edit Meal -->
        <div id="mealModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="modalTitle">Add Meal</h3>
                <form id="mealForm">
                    <input type="hidden" id="mealId">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="mealDate" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="mealType" required>
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Menu Items (comma separated)</label>
                        <input type="text" id="mealMenu" placeholder="e.g., Rice, Beans, Salad" required>
                    </div>
                    <div class="form-group">
                        <label>Booking Deadline (YYYY-MM-DDTHH:MM)</label>
                        <input type="datetime-local" id="mealDeadline" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Meal</button>
                </form>
            </div>
        </div>

        <!-- Modal for Waste Logging -->
        <div id="wasteModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>Log Food Waste</h3>
                <form id="wasteForm">
                    <div class="form-group">
                        <label>Select Meal</label>
                        <select id="wasteMealId" required></select>
                    </div>
                    <div class="form-group">
                        <label>Prepared Quantity (portions)</label>
                        <input type="number" id="preparedQuantity" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Consumed Quantity (portions)</label>
                        <input type="number" id="consumedQuantity" required min="0">
                    </div>
                    <button type="submit" class="btn btn-primary">Log Waste</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
